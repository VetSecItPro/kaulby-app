name: CI

on:
  push:
    branches: [main]
    # Skip the whole workflow on main pushes that only touch non-deployable
    # files. Vercel's ignoreCommand (scripts/vercel-ignore-build.sh) handles
    # the deploy side; this mirrors it for CI compute. Cost driver: every
    # docs-only PR was running the full build matrix on merge.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/runbooks/**'
      - 'public/videos/**'
      - 'public/*.png'
      - 'public/*.jpg'
      - 'public/*.webp'
      - 'public/*.ico'
      - 'public/*.svg'
      - 'public/*.gif'
      - 'public/*.txt'
      - 'CHANGELOG'
      - 'LICENSE'
      - '.editorconfig'
      - '.nvmrc'
      - '.npmrc'
      - '.gitignore'
  pull_request:
    branches: [main]
    # `ready_for_review` is not in the default activity list — without it,
    # CI won't re-run when a draft PR is marked ready, so branch-protection
    # required checks would never land. The other three are defaults but
    # we list them explicitly since this key overrides the defaults.
    types: [opened, synchronize, reopened, ready_for_review]
    # NOTE: do NOT add 'scripts/**' here. Admin scripts run with service_role
    # creds and need the security audit even though they aren't deployed.
    # Do NOT add '__tests__/**' or '*.test.*'. Test changes are real code.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/runbooks/**'
      - 'public/videos/**'
      - 'public/*.png'
      - 'public/*.jpg'
      - 'public/*.webp'
      - 'public/*.ico'
      - 'public/*.svg'
      - 'public/*.gif'
      - 'public/*.txt'
      - 'CHANGELOG'
      - 'LICENSE'
      - '.editorconfig'
      - '.nvmrc'
      - '.npmrc'
      - '.gitignore'
  # GitHub Merge Queue. When a PR is approved + has green CI, it's queued
  # rather than merged directly. The queue creates a temporary
  # `gh-readonly-queue/main/pr-N-<sha>` branch combining the PR with the
  # latest main, fires `merge_group: checks_requested`, and merges only
  # if THIS run goes green. Catches integration breakage that PR-isolated
  # CI misses (the failure mode that bit #335/#336 today).
  merge_group:
    types: [checks_requested]

concurrency:
  # PR runs cancel each other on push; merge_group runs must NOT cancel each
  # other (each represents a different queued combined-state to validate).
  # Keying on ref means each PR has its own group; queue runs (different
  # gh-readonly-queue/* refs) all run in parallel.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NODE_OPTIONS: '--max_old_space_size=4096'

jobs:
  # ─── Fast quality gate (lint + typecheck) ───
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache TypeScript build info
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-${{ hashFiles('tsconfig.json', 'pnpm-lock.yaml') }}-

      - run: pnpm lint
      - run: pnpm exec tsc --noEmit

  # ─── Security scanning ───
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Dependency audit
        run: pnpm audit --audit-level=high --prod
        continue-on-error: true

      - name: Secret pattern scan
        run: |
          echo "Scanning for leaked secrets in source..."
          # Require key-shaped suffix after the prefix so legitimate prefix
          # checks (e.g. `startsWith("sk_live_")` to detect a real prod key)
          # don't trigger. A real Stripe/Clerk secret has 24+ alphanumeric
          # chars after the prefix.
          PATTERNS='sk_live_[a-zA-Z0-9_]{20,}|sk_test_[a-zA-Z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY|ghp_[a-zA-Z0-9]{36}|glpat-[a-zA-Z0-9\-]{20}'
          MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" --include="*.json" -E "$PATTERNS" . \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=.git --exclude-dir=.clerk --exclude-dir=__tests__ \
            --exclude="*.test.ts" --exclude="*.test.tsx" --exclude="*.spec.ts" || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Potential secrets found in source code!"
            echo "$MATCHES"
            exit 1
          fi
          echo "No secrets detected."

      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/owasp-top-ten
            p/nextjs
        continue-on-error: true

  # ─── Build (gates e2e, lighthouse, bundle-size) ───
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    # Skip the expensive build on draft PRs. Quality + security still run on
    # drafts (fast feedback). Build/E2E/Lighthouse only kick in once the PR
    # is marked ready for review. Push to main and merge_group always build.
    # Bundle-size check is folded into this job (see "Bundle size summary"
    # step below) — eliminates a redundant runner that did 30s of spinup
    # + artifact-download for a 10s shell loop.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # NEXT_PUBLIC_* vars are BAKED INTO THE BUNDLE at build time. Pages using
    # Clerk (/sign-in, /pricing, anything behind useUser) crash at runtime when
    # the bundle was compiled with an undefined key, even if the e2e job
    # later provides one. Keep this in lockstep with the `e2e` job env block.
    env:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
      NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /pricing
      NEXT_PUBLIC_APP_URL: https://kaulbyapp.com
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm build

      - name: Remove build cache before upload
        run: rm -rf .next/cache

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextjs-build
          path: .next
          retention-days: 1
          include-hidden-files: true
          if-no-files-found: error
          compression-level: 6

      - name: Build summary
        run: |
          echo "## Build Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -rh | head -20 >> $GITHUB_STEP_SUMMARY || echo "No chunks found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      # Bundle size budget check. Folded in here (was its own job) — the
      # standalone runner spent more time on spinup/checkout/artifact-
      # download than on the actual size check. Inline saves a runner per PR.
      - name: Bundle size budget
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '| File | Size |' >> $GITHUB_STEP_SUMMARY
          echo '|------|------|' >> $GITHUB_STEP_SUMMARY

          WARN=0
          FAIL=0

          for f in $(find .next/static/chunks -name "*.js" -type f 2>/dev/null | sort); do
            SIZE=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo "0")
            SIZE_KB=$((SIZE / 1024))
            NAME=$(basename "$f")

            if [ "$SIZE_KB" -gt 750 ]; then
              echo "| \`$NAME\` | **${SIZE_KB}KB** :x: |" >> $GITHUB_STEP_SUMMARY
              FAIL=$((FAIL + 1))
            elif [ "$SIZE_KB" -gt 500 ]; then
              echo "| \`$NAME\` | **${SIZE_KB}KB** :warning: |" >> $GITHUB_STEP_SUMMARY
              WARN=$((WARN + 1))
            elif [ "$SIZE_KB" -gt 200 ]; then
              echo "| \`$NAME\` | ${SIZE_KB}KB |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Chunks > 500KB: $WARN warnings, $FAIL failures" >> $GITHUB_STEP_SUMMARY

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL chunk(s) exceed 750KB limit"
            exit 1
          fi

  # ─── E2E (Playwright against real app + test Clerk + E2E Neon branch) ───
  # Runs on pull_request only — main-branch pushes skip to keep deploys fast.
  # Uses the built artifact from the `build` job to avoid a second compile.
  # Auth-gated specs (dashboard/monitors/results/settings/onboarding) self-skip
  # in CI via `test.skip(!isLocalDev, ...)`; the 5 remaining specs cover
  # homepage, pricing, sign-in widget, SEO pages, and accessibility.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # Run on non-draft PRs AND on merge_group queue checks (validates the
    # combined state before final merge). Push-to-main skips e2e — by the
    # time code lands on main it has already passed e2e via PR or queue.
    #
    # Dependabot PRs are SKIPPED here. GitHub does not pass repo secrets
    # to dependabot[bot] runs (anti-exfiltration), so NEXT_PUBLIC_CLERK_*
    # is empty during build → ClerkProvider can't initialize → e2e fails
    # 100% of the time on every dep bump regardless of what changed.
    # Lint/Type/Build/Security still run on dependabot PRs and catch
    # actual regressions; e2e adds zero signal when it can't auth.
    if: |
      (
        github.event_name == 'pull_request'
        && github.event.pull_request.draft == false
        && github.actor != 'dependabot[bot]'
      ) || github.event_name == 'merge_group'
    # Bumped from 15→25min on 2026-05-01: `playwright install --with-deps`
    # runs apt-get install on Ubuntu mirrors that periodically slow down,
    # pushing the job past 15min before any actual test runs. 25min gives
    # the slow-mirror tail enough headroom without bloating typical runs.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build
          path: .next

      # Split system deps (apt-get) from browser binary so a slow Ubuntu
      # mirror only blocks the deps step — easier to diagnose, easier to
      # retry just the failing layer if it times out.
      - name: Install Playwright system deps
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright browser (chromium only)
        run: pnpm exec playwright install chromium

      - name: Run E2E tests
        # Task 0.3b fix: build job now has NEXT_PUBLIC_* env (Clerk keys + App URL +
        # PostHog), so the client bundle compiles with a valid Clerk key. /sign-in
        # and /pricing no longer hit the error boundary. 5 specs now running.
        # Task 0.3c tracks the 5 remaining auth-gated specs (dashboard/monitors/
        # results/settings/onboarding) — those self-skip via test.skip(!isLocalDev)
        # and need test-user seeding + dev-auth bypass in CI to unblock.
        run: >-
          pnpm exec playwright test --project=chromium
          e2e/accessibility.spec.ts
          e2e/seo-pages.spec.ts
          e2e/auth.spec.ts
          e2e/billing.spec.ts
          e2e/marketing.spec.ts
        env:
          # App runtime
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
          NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL: /dashboard
          NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL: /pricing

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results (traces + screenshots) on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ─── Lighthouse (reuses build artifact) ───
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    # PR-only AND non-draft. Skip on merge_group too: lighthouse is
    # advisory (continue-on-error) and adds ~1m to every queued PR for
    # zero gating value. Push-to-main also skipped (deploy already done).
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nextjs-build
          path: .next

      - uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  # NOTE: bundle-size check moved INTO the `build` job (above) as a final
  # step. It used to be its own job; the runner spinup + checkout + artifact
  # download cost more than the 10s shell loop that did the actual check.

  # ─── AI eval (only when AI code changes — guards against prompt/model regressions) ───
  # Runs the golden eval set against Kaulby's analyzers. Fails the PR if any metric
  # regresses >5% vs the committed baseline in src/__tests__/ai/eval-baseline.json.
  # Skipped on main pushes (CI already ran on the PR) and on PRs that don't touch AI code.
  ai-eval:
    name: AI Eval (golden set)
    runs-on: ubuntu-latest
    # Drafts skip — eval calls cost real OpenRouter credits. Skip on
    # merge_group too: the PR-side run already validated the AI changes;
    # combining with main can't introduce AI regressions (no prompt code
    # in main that wasn't in the PR's diff). Saves OpenRouter spend.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Check whether AI code changed in this PR
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^src/lib/ai/|^src/__tests__/ai/" || true)
          if [ -n "$CHANGED" ]; then
            echo "ai_changed=true" >> $GITHUB_OUTPUT
            echo "Changed AI files:"
            echo "$CHANGED"
          else
            echo "ai_changed=false" >> $GITHUB_OUTPUT
            echo "No AI code changed — skipping eval run."
          fi

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.changed.outputs.ai_changed == 'true'

      - name: Run golden eval
        if: steps.changed.outputs.ai_changed == 'true'
        run: pnpm eval:ai
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          KAULBY_EVAL_MODEL_TAG: ${{ github.head_ref }}

      - name: Upload eval report on failure
        if: failure() && steps.changed.outputs.ai_changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-eval-report
          path: src/__tests__/ai/eval-last-report.json
          retention-days: 7

  # ─── Summary (always runs) ───
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, security, build, e2e, lighthouse, ai-eval]
    timeout-minutes: 2
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo '| Job | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY

          FAILED=0

          check_job() {
            local name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              echo "| $name | :white_check_mark: passed |" >> $GITHUB_STEP_SUMMARY
            elif [ "$result" = "skipped" ]; then
              echo "| $name | :fast_forward: skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | :x: $result |" >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
            fi
          }

          check_job "Quality" "${{ needs.quality.result }}"
          check_job "Security" "${{ needs.security.result }}"
          check_job "Build (incl. bundle-size)" "${{ needs.build.result }}"
          check_job "E2E" "${{ needs.e2e.result }}"
          check_job "Lighthouse" "${{ needs.lighthouse.result }}"
          check_job "AI Eval" "${{ needs['ai-eval'].result }}"

          if [ "$FAILED" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":x: **$FAILED job(s) failed**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo ":white_check_mark: **All checks passed**" >> $GITHUB_STEP_SUMMARY
