# Skip-pass guard for the E2E Tests required check on Dependabot PRs.
#
# Why: GitHub does not pass repo secrets to dependabot[bot] workflow runs
# (anti-exfiltration). NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is therefore
# empty during the build, ClerkProvider can't initialize at runtime, and
# e2e/auth.spec.ts fails 100% of the time on every dependency bump
# regardless of what was actually bumped. Lint/Type/Build/Security still
# run normally on dependabot PRs and catch real regressions; e2e adds
# zero signal when it can't authenticate.
#
# This workflow runs only on dependabot[bot] PRs and reports the E2E
# Tests required check as success in ~3 seconds so branch protection
# can clear. ci.yml's e2e job is gated to skip on dependabot PRs (see
# the `if:` clause on the e2e job there) so we don't run both.

name: CI (skip-pass for dependabot E2E)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: github.actor == 'dependabot[bot]'
    steps:
      - run: echo "Skipped — dependabot[bot] PRs cannot access repo secrets, e2e cannot authenticate Clerk. Lint/Build/Security still gate."
