name: Setup Node + pnpm
description: |
  Composite action that bundles the four-step setup boilerplate
  (checkout, pnpm install, setup-node with pnpm cache, install deps).
  Used by every CI job to keep the workflow file lean and ensure
  Node version + pnpm version stay in lockstep.

inputs:
  node-version:
    description: Node.js major version
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
